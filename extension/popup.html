<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e4e4e7;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .header img { width: 24px; height: 24px; }
    .header h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.5px; }
    .header span { font-size: 9px; opacity: 0.4; text-transform: uppercase; letter-spacing: 1px; margin-left: auto; }

    .btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      background: rgba(255,255,255,0.03);
      color: #e4e4e7;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
      margin-bottom: 6px;
    }
    .btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
    .btn svg { flex-shrink: 0; opacity: 0.5; }
    .btn .label { flex: 1; text-align: left; }
    .btn .kbd {
      font-size: 9px;
      opacity: 0.3;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .capture-info {
      margin-top: 12px;
      padding: 10px;
      border-radius: 8px;
      background: rgba(74,222,128,0.08);
      border: 1px solid rgba(74,222,128,0.15);
      font-size: 10px;
      color: rgba(74,222,128,0.8);
      display: none;
    }
    .capture-info.show { display: block; }

    .section-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      opacity: 0.3;
      margin: 12px 0 6px;
    }

    .recent {
      font-size: 11px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .recent:hover { background: rgba(255,255,255,0.05); }
    .recent .dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.15); flex-shrink: 0; }
    .recent .name { flex: 1; }
    .recent .time { font-size: 9px; opacity: 0.3; font-family: monospace; }

    .footer {
      margin-top: 14px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer a {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-decoration: none;
    }
    .footer a:hover { color: rgba(255,255,255,0.6); }
  </style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Atlas">
    <h1>Atlas</h1>
    <span>IDE</span>
  </div>

  <button class="btn" id="open-atlas">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="2" width="14" height="11" rx="2"/><path d="M5 15h6"/></svg>
    <span class="label">Open Atlas IDE</span>
    <span class="kbd">⌘⇧A</span>
  </button>

  <button class="btn" id="capture-page">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 5V3a1 1 0 011-1h2M11 2h2a1 1 0 011 1v2M14 11v2a1 1 0 01-1 1h-2M5 14H3a1 1 0 01-1-1v-2"/></svg>
    <span class="label">Capture Page Context</span>
  </button>

  <button class="btn" id="new-project">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M8 3v10M3 8h10"/></svg>
    <span class="label">New Project</span>
  </button>

  <div class="capture-info" id="capture-status">
    ✓ Page context captured — open Atlas to use it
  </div>

  <div class="section-label">Recent Projects</div>
  <div id="recents"></div>

  <div class="footer">
    <a href="#" id="settings-link">Settings</a>
    <a href="#" id="help-link">Help</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
