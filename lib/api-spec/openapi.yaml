openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: nexus
    description: >
      Portfolio-level intelligence. Nexus endpoints operate across the full
      set of projects and produce curated insights — not raw activity logs.
  - name: library
    description: >
      Canonical Library — saved Ask Atlas artifacts, workspace outputs,
      bookmarks, and conversation-attached context. Supersedes home_artifacts
      and project_bookmarks as the read path.
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /nexus/manifest/{projectId}:
    get:
      operationId: getProjectManifest
      tags: [nexus]
      summary: Project Manifest
      description: >
        Reads the project's DNA (genome) and returns the Manifest consumption
        layer — four anchors mapped from existing genome fields, a completeness
        gradient for each anchor (absent / thin / sufficient), the current
        confidence score, which build targets are unlocked, and any open
        questions Atlas has flagged.

        This endpoint never writes. It is a pure reader of the project_genome
        table. Use POST /nexus/manifest/{projectId}/extract to trigger
        AI-powered DNA extraction from existing sessions and entries.
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
          description: The project ID to read the manifest for.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Project manifest successfully read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectManifest"
        "401":
          description: Not authenticated
        "403":
          description: Project does not belong to the authenticated user
        "404":
          description: Project not found

  /projects/{id}/readiness:
    get:
      operationId: getProjectReadiness
      tags: [nexus]
      summary: Project Readiness
      description: >
        Returns a canonical ProjectReadiness object for a single project.
        Every UI surface (workspace header ring, Master Map, Portfolio Health)
        should read from this endpoint instead of computing its own score.
        Combines build signals, strategic node coverage, ledger activity, and
        delivery signals into a weighted composite with per-dimension breakdown.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The project ID.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Project readiness successfully computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectReadiness"
        "401":
          description: Not authenticated
        "404":
          description: Project not found

  /projects/{id}/intelligence:
    get:
      operationId: getProjectIntelligence
      tags: [nexus]
      summary: Project Intelligence (unified source of truth)
      description: >
        The single source of truth for project state. Master Map, Axiom Flow header,
        HUD, Workspace ring, and Portfolio cards must all consume this endpoint instead
        of computing independent realities. Composes genome DNA fields, health signals
        (momentum, clarity, atlasState), readiness % with dimension breakdown, and
        typed entry lists (decisions, blockers, goals, ideas, features, risks).
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: The project ID.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Project intelligence successfully computed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectIntelligence"
        "401":
          description: Not authenticated
        "404":
          description: Project not found

  /portfolio/intelligence:
    get:
      operationId: getPortfolioIntelligence
      tags: [nexus]
      summary: Portfolio Intelligence (batch)
      description: >
        Batch version of /projects/:id/intelligence for all user projects.
        Portfolio cards and the Global Insights surface consume this instead of
        /portfolio/health so they share the same readiness formula and health signals
        as the per-project views.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Portfolio intelligence successfully computed
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProjectIntelligence"
        "401":
          description: Not authenticated

  /nexus/resume:
    get:
      operationId: getPortfolioResume
      tags: [nexus]
      summary: Portfolio Resume
      description: >
        Atlas reads the portfolio and generates a structured brief with four
        curated sections: what moved, what emerged, what is waiting on the
        user, and the single suggested next move.

        The response is cached per user for five minutes so repeated fast
        opens do not trigger re-generation. Pass `?bust=1` to bypass the
        cache and force a fresh read.
      parameters:
        - name: bust
          in: query
          required: false
          schema:
            type: integer
            enum: [1]
          description: >
            Pass `bust=1` to bypass the per-user cache and force a fresh
            generation (e.g. after a pull-to-refresh gesture).
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Portfolio Resume successfully generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioResume"
        "401":
          description: Not authenticated

  /library:
    get:
      operationId: listLibraryItems
      tags: [library]
      summary: List library items
      description: >
        Returns the authenticated user's canonical Library items.
        Filter with projectId (number, or the string "null" for user-level
        home items). Repeat kind to filter by one or more kinds. Cursor
        pagination via limit + cursor.
      parameters:
        - name: projectId
          in: query
          required: false
          schema:
            oneOf:
              - type: integer
              - type: string
                enum: ["null"]
          description: >
            Project scope. Omit for all items; pass a project id for
            project-scoped items; pass the string "null" for user-level
            (home) items only.
        - name: kind
          in: query
          required: false
          schema:
            type: array
            items:
              $ref: "#/components/schemas/LibraryItemKind"
          style: form
          explode: true
          description: Repeatable kind filter.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: Opaque cursor from a previous nextCursor.
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Library items page
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryListResponse"
        "400":
          description: Invalid query
        "401":
          description: Not authenticated
    post:
      operationId: createLibraryItem
      tags: [library]
      summary: Create a library item
      description: >
        Creates a canonical Library item. Used by workspace "save as artifact"
        and future Ask Atlas save flows. Does not write to legacy tables.
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLibraryItemRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryItemResponse"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: Project not found

  /library/{id}:
    get:
      operationId: getLibraryItem
      tags: [library]
      summary: Get a library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Library item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryItemResponse"
        "400":
          description: Invalid id
        "401":
          description: Not authenticated
        "404":
          description: Not found
    patch:
      operationId: updateLibraryItem
      tags: [library]
      summary: Update library item title or kind
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLibraryItemRequest"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryItemResponse"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: Not found
    delete:
      operationId: deleteLibraryItem
      tags: [library]
      summary: Delete a library item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid id
        "401":
          description: Not authenticated
        "404":
          description: Not found

  /library/{id}/context:
    post:
      operationId: attachLibraryItemContext
      tags: [library]
      summary: Attach a library item to a conversation
      description: >
        Attaches an existing library item to a conversation without
        duplicating the item. Soft-reattaches if previously detached.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      security:
        - cookieAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttachLibraryContextRequest"
      responses:
        "200":
          description: Already attached or reattached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "201":
          description: Newly attached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: Not found

  /library/{id}/context/{conversationId}:
    delete:
      operationId: detachLibraryItemContext
      tags: [library]
      summary: Soft-detach a library item from a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: conversationId
          in: path
          required: true
          schema:
            type: string
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Detached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Validation error
        "401":
          description: Not authenticated
        "404":
          description: Not found or not attached

  /conversations/{id}/context:
    get:
      operationId: listConversationContext
      tags: [library]
      summary: List library items attached to a conversation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Conversation id (nexus conversation UUID string)
      security:
        - cookieAuth: []
      responses:
        "200":
          description: Attached library items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LibraryListResponse"
        "401":
          description: Not authenticated

components:
  securitySchemes:
    cookieAuth:
      type: apiKey
      in: cookie
      name: session

  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    OkResponse:
      type: object
      properties:
        ok:
          type: boolean
      required:
        - ok

    LibraryItemKind:
      type: string
      enum:
        - document
        - prd
        - plan
        - strategy
        - spec
        - outline
        - brief
        - bookmark
        - sketch
        - other

    LibraryOriginSource:
      type: string
      enum:
        - ask-atlas
        - workspace
        - upload
        - unknown

    LibraryItemOrigin:
      type: object
      properties:
        source:
          $ref: "#/components/schemas/LibraryOriginSource"
        conversationId:
          type: string
          nullable: true
        messageId:
          type: string
          nullable: true
      required:
        - source

    LibraryItemProject:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id

    LibraryItem:
      type: object
      description: Canonical Library item shape consumed by the frontend.
      properties:
        id:
          type: string
          format: uuid
        kind:
          $ref: "#/components/schemas/LibraryItemKind"
        title:
          type: string
        content:
          type: string
        preview:
          type: string
        project:
          oneOf:
            - $ref: "#/components/schemas/LibraryItemProject"
            - type: "null"
        origin:
          $ref: "#/components/schemas/LibraryItemOrigin"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - kind
        - title
        - preview
        - project
        - origin
        - createdAt

    LibraryListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/LibraryItem"
        nextCursor:
          type: string
          nullable: true
      required:
        - items

    LibraryItemResponse:
      type: object
      properties:
        item:
          $ref: "#/components/schemas/LibraryItem"
      required:
        - item

    CreateLibraryItemRequest:
      type: object
      properties:
        kind:
          $ref: "#/components/schemas/LibraryItemKind"
        title:
          type: string
        content:
          type: string
          nullable: true
        projectId:
          type: integer
          nullable: true
        origin:
          $ref: "#/components/schemas/LibraryItemOrigin"
      required:
        - title

    UpdateLibraryItemRequest:
      type: object
      properties:
        title:
          type: string
        kind:
          $ref: "#/components/schemas/LibraryItemKind"

    AttachLibraryContextRequest:
      type: object
      properties:
        conversationId:
          type: string
      required:
        - conversationId

    IntelligenceEntryItem:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        summary:
          type: string
          nullable: true
        status:
          type: string
        type:
          type: string
          nullable: true
        severity:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - status
        - createdAt

    ProjectIntelligence:
      type: object
      description: >
        The single source of truth for a project. All surfaces — Master Map,
        Axiom Flow header, HUD, Workspace ring, and Portfolio cards — consume
        this object instead of computing independent realities. Composes genome
        DNA, health signals, readiness %, and typed entry lists.
      properties:
        projectId:
          type: integer
        projectName:
          type: string
          nullable: true
        projectDescription:
          type: string
          nullable: true
        projectStatus:
          type: string
          nullable: true
        dna:
          type: object
          description: Genome DNA fields
          properties:
            purpose:
              type: string
              nullable: true
            coreEmotion:
              type: string
              nullable: true
            audience:
              type: string
              nullable: true
            identity:
              type: string
              nullable: true
            wedge:
              type: string
              nullable: true
            differentiator:
              type: string
              nullable: true
            stage:
              type: string
            constraints:
              type: array
              items:
                type: string
            openQuestions:
              type: array
              items:
                type: string
            confidenceScore:
              type: integer
              minimum: 0
              maximum: 100
            lastExtractedAt:
              type: string
              format: date-time
              nullable: true
          required:
            - stage
            - constraints
            - openQuestions
            - confidenceScore
        health:
          type: object
          description: Computed health signals — never stored, always fresh
          properties:
            clarity:
              type: integer
              minimum: 0
              maximum: 100
            confidence:
              type: string
              enum: [Low, Medium, High]
            momentum:
              type: string
              enum: [Low, Medium, High]
            atlasState:
              type: string
              enum: [Discovering, Pressure Testing, Structuring, Building, Operating]
            risk:
              type: string
              nullable: true
            nextAction:
              type: string
            evidence:
              type: object
              properties:
                conversationsLast7Days:
                  type: integer
                openBlockers:
                  type: integer
                openConstraints:
                  type: integer
                openQuestions:
                  type: integer
                confidenceScore:
                  type: integer
          required:
            - clarity
            - confidence
            - momentum
            - atlasState
            - nextAction
        readiness:
          type: object
          description: Canonical readiness score — the workspace ring and portfolio cards read from here
          properties:
            overall:
              type: integer
              minimum: 0
              maximum: 100
            label:
              type: string
            projectKind:
              type: string
              enum: [app, strategy, general]
            warnings:
              type: array
              items:
                type: string
          required:
            - overall
            - label
            - projectKind
            - warnings
        entries:
          type: object
          description: Typed entry lists — Master Map, Ledger, and HUD read from here
          properties:
            decisions:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            blockers:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            goals:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            ideas:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            features:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            risks:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
            openQuestionEntries:
              type: array
              items:
                $ref: "#/components/schemas/IntelligenceEntryItem"
          required:
            - decisions
            - blockers
            - goals
            - ideas
            - features
            - risks
            - openQuestionEntries
        computedAt:
          type: string
          format: date-time
      required:
        - projectId
        - dna
        - health
        - readiness
        - entries
        - computedAt

    DnaAnchor:
      type: object
      description: >
        One of the four foundational anchors of a project's DNA. Each anchor
        carries its current value (or null if absent), a completeness gradient,
        and the question the anchor is designed to answer.
      properties:
        label:
          type: string
          description: Human-readable anchor name (e.g. "Core Intent")
        question:
          type: string
          description: The question this anchor answers (e.g. "What is this, why does it matter, and what makes it different?")
        value:
          type: string
          nullable: true
          description: The current value extracted into this anchor, or null if absent.
        completeness:
          type: string
          enum: [absent, thin, sufficient, locked]
          description: >
            Signal density gradient. "absent" — no value. "thin" — value exists
            but lacks extractable structure. "sufficient" — Manifest can reason
            over this anchor with confidence. "locked" — user has confirmed this
            anchor is stable and should not be re-extracted.
      required:
        - label
        - question
        - completeness

    BuildTarget:
      type: object
      description: >
        A materialisation target Manifest can unlock when the relevant DNA
        anchors reach sufficient completeness.
      properties:
        id:
          type: string
          description: Stable machine identifier (e.g. "landing-page")
        label:
          type: string
          description: Human-readable label (e.g. "Landing Page")
        unlocked:
          type: boolean
          description: Whether this target is unlocked given current DNA completeness.
        reason:
          type: string
          nullable: true
          description: If locked, the human-readable explanation of what is missing.
      required:
        - id
        - label
        - unlocked

    ProjectManifest:
      type: object
      description: >
        The Manifest consumption layer for a single project. Reads from the
        project_genome table and maps the four DNA anchors, confidence score,
        build targets, and open questions into a structured surface. This is
        what the Manifest UI renders — it never guesses, it only reads what
        the genome already contains.
      properties:
        projectId:
          type: integer
        projectName:
          type: string
        stage:
          type: string
          enum: [Think, Shape, Decide, Workspace, Strategize, Build, Operate, Evolve]
          description: The current genome stage of the project.
        confidenceScore:
          type: integer
          minimum: 0
          maximum: 100
          description: >
            Integer 0–100 representing how much of the DNA is populated with
            sufficient signal for Manifest to reason accurately.
        anchors:
          type: object
          description: The four DNA anchors, each with label, question, value, and completeness.
          properties:
            coreIntent:
              $ref: "#/components/schemas/DnaAnchor"
            surfaceStrategy:
              $ref: "#/components/schemas/DnaAnchor"
            coreAudience:
              $ref: "#/components/schemas/DnaAnchor"
            brandPosture:
              $ref: "#/components/schemas/DnaAnchor"
          required:
            - coreIntent
            - surfaceStrategy
            - coreAudience
            - brandPosture
        openQuestions:
          type: array
          items:
            type: string
          description: Questions Atlas has flagged that only the human can answer.
        buildTargets:
          type: array
          items:
            $ref: "#/components/schemas/BuildTarget"
          description: >
            Ordered list of materialisation targets. Unlocked targets are
            immediately actionable. Locked targets show what DNA is missing.
        lastExtractedAt:
          type: string
          format: date-time
          nullable: true
          description: When the genome was last populated by AI extraction. Null if never extracted.
      required:
        - projectId
        - projectName
        - stage
        - confidenceScore
        - anchors
        - openQuestions
        - buildTargets

    ReadinessDimension:
      type: object
      description: >
        One dimension of project readiness. If applicable is false, the
        dimension does not apply to this project kind and should show "N/A"
        rather than 0%.
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
        label:
          type: string
          enum: [Not started, Initializing, In progress, Taking shape, Complete, "N/A"]
        weight:
          type: number
          description: Fractional contribution to overallScore (0.0–1.0, sums to 1 across applicable dimensions).
        applicable:
          type: boolean
          description: False means this dimension does not apply — show "N/A", never 0%.
        evidence:
          type: string
          description: Human-readable explanation of how this score was computed.
      required:
        - score
        - label
        - weight
        - applicable
        - evidence

    ReadinessSourceBreakdown:
      type: object
      description: Raw signal values that fed into the readiness computation.
      properties:
        appBuildSucceeded:
          type: boolean
          nullable: true
        appSourceFileCount:
          type: integer
          nullable: true
        flowDefinedNodes:
          type: integer
        flowTotalNodes:
          type: integer
        committedEntries:
          type: integer
        totalEntries:
          type: integer
        genomeConfidenceScore:
          type: integer
        genomeStage:
          type: string
        latestSnapshotScore:
          type: integer
          nullable: true
        hasLinkedRepo:
          type: boolean
        hasPreviewUrl:
          type: boolean
      required:
        - flowDefinedNodes
        - flowTotalNodes
        - committedEntries
        - totalEntries
        - genomeConfidenceScore
        - genomeStage
        - hasLinkedRepo
        - hasPreviewUrl

    ProjectReadiness:
      type: object
      description: >
        Canonical readiness signal for a project. Every UI surface reads this
        instead of computing its own score. overallScore and overallLabel are
        the single source of truth for any "%  complete" or "% ready" display.
      properties:
        overallScore:
          type: integer
          minimum: 0
          maximum: 100
          description: Weighted composite of all applicable dimensions.
        overallLabel:
          type: string
          enum: [Getting started, Building, Taking shape, Preview ready, Shipping]
          description: Human-readable label matching the overallScore bracket.
        projectKind:
          type: string
          enum: [app, strategy, general]
          description: Detected project kind — drives dimension weights.
        dimensions:
          type: object
          description: Per-dimension breakdown. Only applicable dimensions are included.
          properties:
            build:
              $ref: "#/components/schemas/ReadinessDimension"
            strategy:
              $ref: "#/components/schemas/ReadinessDimension"
            activity:
              $ref: "#/components/schemas/ReadinessDimension"
            delivery:
              $ref: "#/components/schemas/ReadinessDimension"
        warnings:
          type: array
          items:
            type: string
          description: Human-readable warnings about signal quality (e.g. build predates tracking).
        sourceBreakdown:
          $ref: "#/components/schemas/ReadinessSourceBreakdown"
      required:
        - overallScore
        - overallLabel
        - projectKind
        - dimensions
        - warnings
        - sourceBreakdown

    PortfolioResume:
      type: object
      description: >
        A curated, Atlas-generated brief across the user's full portfolio.
        This is a first-class platform service — not a Home widget.
        Consumed by Home, future Mobile, Notifications, Daily Briefings,
        and any surface that needs to surface "what matters right now."
      properties:
        whatMoved:
          type: array
          items:
            type: string
          description: >
            Factual bullet strings — specific things that changed across
            projects since the user was last active. Reference real project
            names. Maximum four items.
        whatEmerged:
          type: string
          description: >
            One key insight or pattern Atlas noticed across the portfolio.
            1-2 sentences. Not a summary of facts — the underlying pattern.
        waitingOnYou:
          type: string
          description: >
            The single most important decision or question only the human
            can answer right now.
        suggestedNextMove:
          type: string
          description: >
            Exactly one concrete next action. No alternatives. Decisive.
      required:
        - whatMoved
        - whatEmerged
        - waitingOnYou
        - suggestedNextMove

