kind = "web"
previewPath = "/"
title = "Atlas Frontend"
version = "1.0.0"
id = "artifacts/atlas-frontend"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22883

[services.development]
run = "pnpm --filter @workspace/atlas-frontend run dev"

[services.production]
build = [ "bash", "scripts/build-frontend-prod.sh" ]
publicDir = "artifacts/atlas-frontend/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22883"
BASE_PATH = "/"
