kind = "api"
  previewPath = "/api" # TODO - should be excluded from preview in the first place
  title = "API Server"
  version = "1.0.0"
  id = "3B4_FFSkEVBkAeYMFRJ2e"

  [[services]]
  localPort = 8080
  name = "API Server"
  paths = ["/api"]

  [services.development]
  run = "pnpm --filter @workspace/api-server run dev"

  [services.production]

  [services.production.build]
  args = ["pnpm", "--filter", "@workspace/api-server", "run", "build"]

  [services.production.build.env]
  NODE_ENV = "production"

  [services.production.run]
  # /bin/sh is stable in the base container (not nix-store hash dependent).
  # run-api.sh is generated by build-frontend-prod.sh with the absolute nix
  # store path to node, captured at build time when PATH is correctly set.
  args = ["/bin/sh", "run-api.sh"]

  [services.production.run.env]
  PORT = "8080"
  NODE_ENV = "production"

  [services.production.health.startup]
  path = "/api/healthz"
  initialDelaySeconds = 60
  