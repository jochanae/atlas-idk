openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Atlas - Strategic Thinking Partner API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: projects
    description: Project management
  - name: sessions
    description: Chat sessions
  - name: messages
    description: Chat messages
  - name: entries
    description: Decision ledger entries
  - name: chat
    description: AI chat
  - name: nexus
    description: Nexus global command space (mode, not a project)
  - name: import
    description: Axiom handoff import
  - name: forge
    description: Strategic node extraction pipeline
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /import:
    post:
      operationId: axiomImport
      tags: [import]
      summary: Receive a handoff payload from Axiom and seed a new Atlas project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AxiomImportBody"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AxiomImportResponse"
        "400":
          description: Invalid payload

  /forge:
    post:
      operationId: runForge
      tags: [forge]
      summary: Extract strategic nodes from a raw transcript using AI
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgeRequest"
      responses:
        "200":
          description: Extracted nodes and summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForgeResponse"
        "400":
          description: Invalid request
        "500":
          description: Forge processing error

  /vault:
    get:
      operationId: listVaultSaves
      tags: [vault]
      summary: List all saved vault snapshots
      responses:
        "200":
          description: List of vault saves
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VaultSave"
    post:
      operationId: createVaultSave
      tags: [vault]
      summary: Save a ledger snapshot to the vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVaultSaveBody"
      responses:
        "201":
          description: Created vault save
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VaultSave"
        "400":
          description: Invalid payload

  /vault/{id}:
    delete:
      operationId: deleteVaultSave
      tags: [vault]
      summary: Delete a vault save
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /thoughts:
    get:
      operationId: listThoughts
      tags: [thoughts]
      summary: List all saved thoughts
      responses:
        "200":
          description: List of thoughts
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Thought"
    post:
      operationId: createThought
      tags: [thoughts]
      summary: Save a new thought
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateThoughtBody"
      responses:
        "201":
          description: Created thought
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Thought"

  /thoughts/{id}:
    delete:
      operationId: deleteThought
      tags: [thoughts]
      summary: Delete a thought
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List all projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectBody"
      responses:
        "201":
          description: Created project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"

  /projects/{id}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Update a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectBody"
      responses:
        "200":
          description: Updated project
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /projects/{id}/summary:
    get:
      operationId: getProjectSummary
      tags: [projects]
      summary: Get project summary stats
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectSummary"

  /projects/{id}/readiness-snapshots:
    get:
      operationId: listReadinessSnapshots
      tags: [projects]
      summary: List readiness score snapshots for a project
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of readiness snapshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ReadinessSnapshot"
    post:
      operationId: recordReadinessSnapshot
      tags: [projects]
      summary: Record a readiness score snapshot
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateReadinessSnapshotBody"
      responses:
        "201":
          description: Created snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReadinessSnapshot"
        "400":
          description: Invalid payload

  /projects/{projectId}/sessions:
    get:
      operationId: listSessions
      tags: [sessions]
      summary: List sessions for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of sessions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Session"
    post:
      operationId: createSession
      tags: [sessions]
      summary: Create a new session
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSessionBody"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Session"

  /sessions/{id}:
    get:
      operationId: getSession
      tags: [sessions]
      summary: Get a session with its messages
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Session with messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionWithMessages"
        "404":
          description: Not found
    delete:
      operationId: deleteSession
      tags: [sessions]
      summary: Delete a session
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /sessions/{sessionId}/messages:
    get:
      operationId: listMessages
      tags: [messages]
      summary: List messages in a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Message"

  /projects/{projectId}/entries:
    get:
      operationId: listEntries
      tags: [entries]
      summary: List decision ledger entries for a project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [committed, parked, draft, archived]
      responses:
        "200":
          description: List of entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Entry"
    post:
      operationId: createEntry
      tags: [entries]
      summary: Create a ledger entry
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEntryBody"
      responses:
        "201":
          description: Created entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"

  /entries/{id}:
    get:
      operationId: getEntry
      tags: [entries]
      summary: Get a single ledger entry by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found
    patch:
      operationId: updateEntry
      tags: [entries]
      summary: Update a ledger entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntryBody"
      responses:
        "200":
          description: Updated entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found
    delete:
      operationId: deleteEntry
      tags: [entries]
      summary: Delete a ledger entry
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /entries/{id}/reopen:
    post:
      operationId: reopenEntry
      tags: [entries]
      summary: Reopen a committed entry as a new draft
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: New draft entry with supersedes_id set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Entry"
        "404":
          description: Not found

  /chat:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a message and get an AI response
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /nexus/thread:
    get:
      operationId: getNexusThread
      tags: [nexus]
      summary: Get the full Nexus Living Thread for the authenticated user
      responses:
        "200":
          description: List of Nexus messages (oldest first)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NexusMessage"
    delete:
      operationId: clearNexusThread
      tags: [nexus]
      summary: Clear the entire Nexus thread (emergency reset)
      responses:
        "204":
          description: Cleared

  /nexus/chat:
    post:
      operationId: sendNexusMessage
      tags: [nexus]
      summary: Send a message in Nexus Mode — Atlas responds with full cross-project awareness
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NexusChatRequest"
      responses:
        "200":
          description: Atlas response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NexusChatResponse"
        "400":
          description: Invalid request

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Project:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        memory:
          type: ["string", "null"]
        previewUrl:
          type: ["string", "null"]
        githubToken:
          type: ["string", "null"]
        linkedRepo:
          type: ["string", "null"]
        nodeState:
          type: object
          additionalProperties: true
          nullable: true
        pushHistory:
          type: array
          items: {}
          nullable: true
        lastHandoverAt:
          type: ["string", "null"]
        lastHandoverHash:
          type: ["string", "null"]
        latestSnapshotScore:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - name
        - status
        - createdAt
        - updatedAt

    CreateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
      required:
        - name

    UpdateProjectBody:
      type: object
      properties:
        name:
          type: string
        description:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, archived]
        memory:
          type: ["string", "null"]
        previewUrl:
          type: ["string", "null"]
        githubToken:
          type: ["string", "null"]
        linkedRepo:
          type: ["string", "null"]
        nodeState:
          type: object
          additionalProperties: true
          nullable: true
        pushHistory:
          type: array
          items: {}
          nullable: true
        lastHandoverAt:
          type: ["string", "null"]
        lastHandoverHash:
          type: ["string", "null"]

    ProjectSummary:
      type: object
      properties:
        projectId:
          type: integer
        sessionCount:
          type: integer
        committedCount:
          type: integer
        parkedCount:
          type: integer
        recentMode:
          type: ["string", "null"]
      required:
        - projectId
        - sessionCount
        - committedCount
        - parkedCount

    Session:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        title:
          type: string
        mode:
          type: ["string", "null"]
        status:
          type: string
          enum: [active, closed]
        messageCount:
          type: integer
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - projectId
        - title
        - status
        - messageCount
        - createdAt
        - updatedAt

    CreateSessionBody:
      type: object
      properties:
        title:
          type: string
        mode:
          type: ["string", "null"]
        seedMessage:
          type: ["string", "null"]
        seedIntentType:
          type: ["string", "null"]
      required:
        - title

    SessionWithMessages:
      type: object
      properties:
        session:
          $ref: "#/components/schemas/Session"
        messages:
          type: array
          items:
            $ref: "#/components/schemas/Message"
      required:
        - session
        - messages

    Message:
      type: object
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
        intentType:
          type: ["string", "null"]
        catchPayload:
          type: ["object", "null"]
        createdAt:
          type: string
      required:
        - id
        - sessionId
        - role
        - content
        - createdAt

    Entry:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        sessionId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [committed, parked, draft, archived]
        title:
          type: string
        summary:
          type: ["string", "null"]
        details:
          type: ["string", "null"]
        severity:
          type: string
          enum: [blocker, parked, committed, neutral]
        verb:
          type: ["string", "null"]
        buildId:
          type: ["string", "null"]
        touched:
          type: ["array", "null"]
          items:
            type: string
        isViolation:
          type: boolean
        costOfLesson:
          type: ["number", "null"]
        deviation:
          type: boolean
        deviationReason:
          type: ["string", "null"]
        catchAgainstId:
          type: ["integer", "null"]
        supersedesId:
          type: ["integer", "null"]
        cardSchemaVersion:
          type: ["integer", "null"]
        lockedAt:
          type: ["string", "null"]
        mode:
          type: ["string", "null"]
        sourceMessageId:
          type: ["integer", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - projectId
        - status
        - title
        - severity
        - isViolation
        - deviation
        - createdAt
        - updatedAt

    CreateEntryBody:
      type: object
      properties:
        sessionId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [committed, parked, draft]
        title:
          type: string
          minLength: 1
        summary:
          type: ["string", "null"]
        details:
          type: ["string", "null"]
        severity:
          type: string
          enum: [blocker, parked, committed, neutral]
        verb:
          type: ["string", "null"]
        buildId:
          type: ["string", "null"]
        touched:
          type: ["array", "null"]
          items:
            type: string
        costOfLesson:
          type: ["number", "null"]
        deviationReason:
          type: ["string", "null"]
        catchAgainstId:
          type: ["integer", "null"]
        supersedesId:
          type: ["integer", "null"]
        cardSchemaVersion:
          type: ["integer", "null"]
        mode:
          type: ["string", "null"]
        sourceMessageId:
          type: ["integer", "null"]
      required:
        - title
        - status
        - severity

    UpdateEntryBody:
      type: object
      properties:
        status:
          type: string
          enum: [committed, parked, draft, archived]
        title:
          type: string
          minLength: 1
        summary:
          type: ["string", "null"]
        details:
          type: ["string", "null"]
        severity:
          type: string
          enum: [blocker, parked, committed, neutral]
        verb:
          type: ["string", "null"]
        buildId:
          type: ["string", "null"]
        touched:
          type: ["array", "null"]
          items:
            type: string
        costOfLesson:
          type: ["number", "null"]
        deviationReason:
          type: ["string", "null"]
        sourceMessageId:
          type: ["integer", "null"]

    ChatRequest:
      type: object
      properties:
        sessionId:
          type: integer
        projectId:
          type: integer
        message:
          type: string
        mode:
          type: string
        history:
          type: array
          items:
            $ref: "#/components/schemas/ChatHistoryItem"
        entries:
          type: array
          items:
            $ref: "#/components/schemas/EntryContext"
      required:
        - sessionId
        - projectId
        - message
        - mode

    ChatHistoryItem:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    EntryContext:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        status:
          type: string
      required:
        - id
        - title
        - status

    ReadinessSnapshot:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: integer
        score:
          type: integer
        recordedAt:
          type: string
      required:
        - id
        - projectId
        - score
        - recordedAt

    CreateReadinessSnapshotBody:
      type: object
      properties:
        score:
          type: integer
          minimum: 0
          maximum: 100
      required:
        - score

    VaultSave:
      type: object
      properties:
        id:
          type: integer
        projectId:
          type: ["integer", "null"]
        projectName:
          type: string
        title:
          type: string
        content:
          type: string
        entryCount:
          type: integer
        tags:
          type: ["array", "null"]
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - projectName
        - title
        - content
        - entryCount
        - createdAt

    CreateVaultSaveBody:
      type: object
      properties:
        projectId:
          type: ["integer", "null"]
        projectName:
          type: string
        title:
          type: string
        content:
          type: string
        entryCount:
          type: integer
        tags:
          type: ["array", "null"]
          items:
            type: string
      required:
        - projectName
        - title
        - content
        - entryCount

    Thought:
      type: object
      properties:
        id:
          type: integer
        content:
          type: string
        createdAt:
          type: string
      required:
        - id
        - content
        - createdAt

    CreateThoughtBody:
      type: object
      properties:
        content:
          type: string
      required:
        - content

    ChatResponse:
      type: object
      properties:
        content:
          type: string
        intentType:
          type: ["string", "null"]
        catchPayload:
          type: ["object", "null"]
        memoryChips:
          type: array
          items:
            type: string
          description: Short keyword/phrase chips extracted from this response for the user to see what Atlas is tracking
        messageId:
          type: integer
      required:
        - content
        - messageId

    AxiomImportDecision:
      type: object
      properties:
        tier:
          type: integer
          minimum: 1
          maximum: 3
        text:
          type: string
      required:
        - tier
        - text

    AxiomImportBody:
      type: object
      properties:
        project_name:
          type: string
        builder:
          type: string
        nodes_resolved:
          type: array
          items:
            type: string
        manifest:
          type: string
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/AxiomImportDecision"
      required:
        - project_name

    AxiomImportResponse:
      type: object
      properties:
        projectId:
          type: integer
      required:
        - projectId

    ForgeRequest:
      type: object
      properties:
        transcript:
          type: string
          minLength: 10
          maxLength: 20000
        projectContext:
          type: string
          maxLength: 4000
          description: Optional project context to improve node extraction accuracy
        projectId:
          type: integer
      required:
        - transcript

    ForgeNode:
      type: object
      properties:
        id:
          type: string
        label:
          type: string
        type:
          type: string
          enum: [goal, requirement, blocker, priority, decision, sprint]
        resolved:
          type: boolean
        x:
          type: number
        y:
          type: number
        details:
          type: string
        meta:
          type: string
          enum: [must, should, could, wont]
        question:
          type: string
          description: Strategic pivot question for this node
      required:
        - id
        - label
        - type
        - resolved
        - x
        - y

